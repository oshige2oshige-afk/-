<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>技能分析 - 2台同時起動対策版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js"></script>
  <style>
    body { font-family: sans-serif; background: #f0f2f5; text-align: center; margin: 0; padding-bottom: 100px; }
    .container { display: flex; justify-content: center; gap: 10px; padding: 10px; flex-wrap: wrap; }
    .box { background: white; padding: 10px; border-radius: 15px; width: 350px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    .video-wrap { position: relative; width: 320px; height: 240px; background: #333; border-radius: 8px; overflow: hidden; margin: 0 auto; }
    video { display: none; } 
    canvas { position: absolute; top: 0; left: 0; width: 320px; height: 240px; }
    .status { background: #f8f9fa; padding: 8px; border-radius: 8px; font-size: 12px; margin-top: 8px; text-align: left; }
    .controls { background: white; padding: 15px; position: fixed; bottom: 0; width: 100%; border-top: 2px solid #ddd; z-index: 1000; }
    button { padding: 10px 30px; font-size: 16px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; background: #1a73e8; color: white; }
    button:disabled { background: #ccc; }
    #msg { color: #d93025; font-weight: bold; font-size: 14px; margin: 10px; }
  </style>
</head>
<body>

<h3>技能分析：2台カメラ安定起動版</h3>
<div id="msg">AIモデルを読み込んでいます...</div>

<div class="container">
  <div class="box">
    <label>① 視線用：</label>
    <select id="sel1" style="width:200px;"></select>
    <div class="video-wrap">
      <video id="v1" autoplay playsinline muted></video>
      <canvas id="c1" width="320" height="240"></canvas>
    </div>
  </div>

  <div class="box">
    <label>② 手元用：</label>
    <select id="sel2" style="width:200px;"></select>
    <div class="video-wrap">
      <video id="v2" autoplay playsinline muted></video>
      <canvas id="c2" width="320" height="240"></canvas>
    </div>
    <div class="status">距離: <span id="distStatus">-</span></div>
  </div>
</div>

<div class="controls">
  試行：<input type="number" id="trialNum" value="1" style="width:40px;"> 
  <button id="startBtn" disabled>カメラを順番に起動</button>
  <button id="stopBtn" onclick="location.reload()" style="background:#666;">リセット</button>
</div>

<script type="module">
  import { FaceLandmarker, HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

  let faceLM, handLM;
  let isRec = false, dataLog = [];
  let gaze = {x:0.5, y:0.5}, hand = {x:0.5, y:0.5};

  async function initAI() {
    try {
      const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
      faceLM = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task" },
        runningMode: "VIDEO"
      });
      handLM = await HandLandmarker.createFromOptions(vision, {
        baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task" },
        runningMode: "VIDEO", numHands: 1, minHandDetectionConfidence: 0.3
      });

      // カメラリスト取得
      await navigator.mediaDevices.getUserMedia({ video: true });
      const devices = await navigator.mediaDevices.enumerateDevices();
      const vids = devices.filter(d => d.kind === 'videoinput');
      vids.forEach((v, i) => {
        document.getElementById("sel1").add(new Option(v.label||`Cam ${i+1}`, v.deviceId));
        document.getElementById("sel2").add(new Option(v.label||`Cam ${i+1}`, v.deviceId));
      });
      if(vids.length > 1) document.getElementById("sel2").selectedIndex = 1;

      document.getElementById("msg").innerText = "準備完了。カメラを選択して起動ボタンを押してください。";
      document.getElementById("startBtn").disabled = false;
    } catch (e) {
      document.getElementById("msg").innerText = "初期化エラー: " + e.message;
    }
  }

  async function startOneCam(vEl, id) {
    const constraints = {
      video: {
        deviceId: { exact: id },
        width: { ideal: 320 }, // 低解像度で帯域を節約
        height: { ideal: 240 },
        frameRate: { ideal: 15 } // フレームレートも抑える
      }
    };
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    vEl.srcObject = stream;
    return new Promise(r => vEl.onloadedmetadata = r);
  }

  document.getElementById("startBtn").onclick = async () => {
    document.getElementById("startBtn").disabled = true;
    try {
      document.getElementById("msg").innerText = "1台目のカメラを起動中...";
      await startOneCam(document.getElementById("v1"), document.getElementById("sel1").value);
      
      document.getElementById("msg").innerText = "待機中（USB負荷調整）...";
      await new Promise(r => setTimeout(r, 1500)); // 1.5秒待つ

      document.getElementById("msg").innerText = "2台目のカメラを起動中...";
      await startOneCam(document.getElementById("v2"), document.getElementById("sel2").value);

      document.getElementById("msg").innerText = "解析中...";
      isRec = true;
      render();
    } catch (e) {
      document.getElementById("msg").innerText = "カメラ起動失敗: " + e.name + ". カメラが別々か、他のアプリで使っていないか確認してください。";
      document.getElementById("startBtn").disabled = false;
    }
  };

  function render() {
    if(!isRec) return;
    const now = performance.now();
    const v1 = document.getElementById("v1"), v2 = document.getElementById("v2");
    const c1 = document.getElementById("c1"), c2 = document.getElementById("c2");
    const ctx1 = c1.getContext("2d"), ctx2 = c2.getContext("2d");

    if(v1.readyState >= 2) {
      ctx1.drawImage(v1, 0, 0, 320, 240);
      const res = faceLM.detectForVideo(v1, now);
      if(res.faceLandmarks && res.faceLandmarks[0]) {
        const iris = res.faceLandmarks[0][468];
        gaze.x = 0.5 + (iris.x - 0.5) * 5;
        gaze.y = 0.5 + (iris.y - 0.45) * 6;
        ctx1.fillStyle = "lime"; ctx1.beginPath(); ctx1.arc(iris.x*320, iris.y*240, 4, 0, 7); ctx1.fill();
      }
    }

    if(v2.readyState >= 2) {
      ctx2.drawImage(v2, 0, 0, 320, 240);
      const res = handLM.detectForVideo(v2, now);
      if(res.landmarks && res.landmarks[0]) {
        const lm = res.landmarks[0];
        const avgX = (lm[0].x + lm[5].x + lm[9].x + lm[17].x) / 4;
        const avgY = (lm[0].y + lm[5].y + lm[9].y + lm[17].y) / 4;
        hand.x = hand.x + (avgX - hand.x) * 0.4;
        hand.y = hand.y + (avgY - hand.y) * 0.4;
        ctx2.fillStyle = "blue"; ctx2.beginPath(); ctx2.arc(hand.x*320, hand.y*240, 8, 0, 7); ctx2.fill();
      }
      // 視線位置を右側に描画
      ctx2.strokeStyle = "lime"; ctx2.strokeRect(gaze.x*320-10, gaze.y*240-10, 20, 20);
      const d = Math.sqrt(Math.pow(gaze.x-hand.x,2)+Math.pow(gaze.y-hand.y,2));
      document.getElementById("distStatus").innerText = d.toFixed(3);
    }
    requestAnimationFrame(render);
  }

  initAI();
</script>
</body>
</html>
