<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDS-DMA Web: 技能伝承・動作解析システム</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --main-red: #e74c3c; --dark-bg: #121212; --card-bg: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: white; margin: 0; padding-bottom: 100px; }
        header { background: #000; padding: 20px; text-align: center; border-bottom: 3px solid var(--main-red); }
        .setup-guide { background: #2c3e50; padding: 10px; font-size: 0.9em; color: #f1c40f; text-align: center; font-weight: bold; }
        
        .main-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .cam-box { background: var(--card-bg); border: 2px solid #333; border-radius: 12px; padding: 10px; width: 450px; text-align: center; }
        .video-wrapper { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 8px; overflow: hidden; margin-top: 10px; }
        video, canvas { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
        
        .controls { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 20px; display: flex; justify-content: center; align-items: center; gap: 20px; border-top: 1px solid #444; z-index: 100; }
        button { padding: 12px 35px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; border-radius: 50px; transition: 0.3s; }
        #record-btn { background: var(--main-red); color: white; }
        #record-btn.active { background: #555; }
        #dl-btn { background: #2ecc71; color: white; display: none; }

        .dashboard { width: 90%; max-width: 1000px; margin: 30px auto; background: var(--card-bg); padding: 30px; border-radius: 15px; display: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .chart-box { background: white; padding: 15px; border-radius: 10px; height: 300px; }
        select { background: #333; color: white; padding: 8px; border: 1px solid #555; width: 100%; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>TAKUMI Development System (TDS-DMA Web)</h1>
    <div style="opacity: 0.8;">技能伝承システム：動作および視線活動分析</div>
</header>

<div class="setup-guide">
    ⚠️ 重要設定：カメラとの距離を 65cm に固定し、正面（視線）と真上（手元）に配置してください。
</div>

<div class="main-container">
    <div class="cam-box">
        <select id="sel-f"></select>
        <div class="video-wrapper">
            <video id="v-face" autoplay playsinline muted></video>
            <canvas id="c-face"></canvas>
            <div style="position:absolute; bottom:5px; left:5px; background:rgba(0,0,0,0.6); padding:2px 8px; font-size:12px;">CAM 1: 正面/視線</div>
        </div>
    </div>
    <div class="cam-box">
        <select id="sel-h"></select>
        <div class="video-wrapper">
            <video id="v-hand" autoplay playsinline muted></video>
            <canvas id="c-hand"></canvas>
            <div style="position:absolute; bottom:5px; left:5px; background:rgba(0,0,0,0.6); padding:2px 8px; font-size:12px;">CAM 2: 真上/手元</div>
        </div>
    </div>
</div>

<div class="controls">
    試行: <input type="number" id="trial" value="1" style="width:50px; padding:8px; border-radius:5px; border:none;">
    <button id="record-btn">計測開始 (Start Analysis)</button>
    <button id="dl-btn">CSVダウンロード</button>
</div>

<div class="dashboard" id="dash">
    <h2 style="border-bottom: 2px solid var(--main-red); margin-bottom:20px;">技能解析レポート</h2>
    <div class="grid">
        <div class="chart-box"><canvas id="gazeChart"></canvas></div>
        <div class="chart-box"><canvas id="pathChart"></canvas></div>
    </div>
    <div id="stat-summary" style="margin-top:20px; line-height:1.6; background:#333; padding:15px; border-radius:8px;"></div>
</div>

<script>
const vFace = document.getElementById('v-face');
const vHand = document.getElementById('v-hand');
const recordBtn = document.getElementById('record-btn');
const dlBtn = document.getElementById('dl-btn');
const dash = document.getElementById('dash');

let isRecording = false;
let log = [];
let charts = {};

// MediaPipe Setup
const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5 });
hands.setOptions({ maxNumHands: 2, minDetectionConfidence: 0.8 });

let state = { gaze: "Center", rx:null, ry:null, lx:null, ly:null };

faceMesh.onResults(res => {
    if (res.multiFaceLandmarks?.length > 0) {
        const n = res.multiFaceLandmarks[0][1];
        state.gaze = (n.x < 0.47 || n.x > 0.53) ? "Off-Center" : "Center";
    }
});

hands.onResults(res => {
    state.rx = state.ry = state.lx = state.ly = null;
    if (res.multiHandLandmarks) {
        res.multiHandLandmarks.forEach((lms, i) => {
            const side = res.multiHandedness[i].label;
            const p = lms[9];
            if(side === 'Right') { state.rx = (p.x*100).toFixed(1); state.ry = ((1-p.y)*100).toFixed(1); }
            else { state.lx = (p.x*100).toFixed(1); state.ly = ((1-p.y)*100).toFixed(1); }
        });
    }
});

// Camera Start Logic (修正版: 強制指定と時差起動)
async function startStream(select, video) {
    if (video.srcObject) {
        video.srcObject.getTracks().forEach(t => t.stop());
    }
    const id = select.value;
    const constraints = {
        video: { deviceId: id ? { exact: id } : undefined, width: 640, height: 480 }
    };
    try {
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
    } catch (e) {
        console.error("Camera Error:", e);
    }
}

// Recording Timer
recordBtn.onclick = () => {
    isRecording = !isRecording;
    if (isRecording) {
        log = []; 
        recordBtn.innerText = "計測中... (停止して分析)";
        recordBtn.classList.add('active');
        dash.style.display = "none";
        dlBtn.style.display = "none";
        timer = setInterval(() => {
            log.push({ ...state, ts: log.length });
        }, 1000);
    } else {
        clearInterval(timer);
        recordBtn.innerText = "計測開始 (Start Analysis)";
        recordBtn.classList.remove('active');
        dlBtn.style.display = "inline-block";
        runAnalysis();
    }
};

function runAnalysis() {
    dash.style.display = "block";
    const centers = log.filter(d => d.gaze === "Center").length;
    const total = log.length;

    if(charts.g) charts.g.destroy();
    charts.g = new Chart(document.getElementById('gazeChart'), {
        type: 'pie',
        data: { labels: ['注視', '逸脱'], datasets: [{ data: [centers, total-centers], backgroundColor: ['#2ecc71', '#e74c3c'] }] },
        options: { plugins: { title: { display: true, text: '視線集中度 (%)' } } }
    });

    const rPath = log.filter(d => d.rx !== null).map(d => ({x: d.rx, y: d.ry}));
    if(charts.p) charts.p.destroy();
    charts.p = new Chart(document.getElementById('pathChart'), {
        type: 'scatter',
        data: { datasets: [{ label: '右手軌跡', data: rPath, backgroundColor: 'red' }] },
        options: { scales: { x: {min:0, max:100}, y: {min:0, max:100} }, plugins: { title: { display: true, text: '手の動作範囲' } } }
    });

    document.getElementById('stat-summary').innerHTML = `
        <strong>【解析結果】</strong> 試行回数: ${document.getElementById('trial').value}<br>
        ・計測時間: ${total} 秒<br>
        ・視線集中率: ${Math.round((centers/total)*100)} %<br>
        ・データ有効数: ${rPath.length}回
    `;
}

dlBtn.onclick = () => {
    let csv = "Time,Gaze,RightX,RightY,LeftX,LeftY\n";
    log.forEach(d => csv += `${d.ts},${d.gaze},${d.rx},${d.ry},${d.lx},${d.ly}\n`);
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `TDS_DMA_Data_Trial${document.getElementById('trial').value}.csv`;
    a.click();
};

async function init() {
    const devs = await navigator.mediaDevices.enumerateDevices();
    const vds = devs.filter(d => d.kind === 'videoinput');
    const selF = document.getElementById('sel-f');
    const selH = document.getElementById('sel-h');
    
    vds.forEach((d, i) => {
        selF.add(new Option(d.label || `CAM ${i}`, d.deviceId));
        selH.add(new Option(d.label || `CAM ${i}`, d.deviceId));
    });

    // 1台目起動
    await startStream(selF, vFace);

    // 2台目は少し時間を置いてから別デバイスを指定して起動
    if(vds.length > 1) {
        selH.selectedIndex = 1;
        setTimeout(async () => {
            await startStream(selH, vHand);
        }, 1500);
    }

    selF.onchange = () => startStream(selF, vFace);
    selH.onchange = () => startStream(selH, vHand);

    function loop() {
        if(vFace.readyState >= 2) faceMesh.send({image: vFace});
        if(vHand.readyState >= 2) hands.send({image: vHand});
        requestAnimationFrame(loop);
    }
    loop();
}

init();
</script>
</body>
</html>
