<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDS-DMA Web: 技能分析システム（安定起動版）</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --main-red: #e74c3c; --bg-dark: #121212; --card-bg: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; padding-bottom: 150px; }
        header { background: #000; padding: 20px; text-align: center; border-bottom: 3px solid var(--main-red); }
        .main-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .cam-box { background: var(--card-bg); border: 2px solid #333; border-radius: 12px; padding: 15px; width: 420px; text-align: center; position: relative; }
        .video-wrapper { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 8px; overflow: hidden; margin-top: 10px; }
        video, canvas { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
        .controls { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 20px; display: flex; justify-content: center; align-items: center; gap: 20px; border-top: 1px solid #444; z-index: 1000; }
        button { padding: 12px 35px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; border-radius: 50px; }
        #record-btn { background: var(--main-red); color: white; }
        #record-btn:disabled { background: #555; cursor: wait; }
        #dl-btn { background: #2ecc71; color: white; display: none; }
        .dashboard { width: 95%; max-width: 1000px; margin: 30px auto; background: var(--card-bg); padding: 25px; border-radius: 15px; display: none; }
        .chart-container { background: white; padding: 15px; border-radius: 10px; height: 320px; position: relative; }
        select { background: #333; color: white; padding: 8px; width: 100%; border-radius: 5px; margin-bottom: 5px; }
        .loading-overlay { position: absolute; top: 55px; left: 15px; width: calc(100% - 30px); height: calc(100% - 70px); background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; border-radius: 8px; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <h1>TAKUMI Development System (TDS-DMA Web)</h1>
    <div id="ai-status">システム準備中...</div>
</header>

<div class="main-container">
    <div class="cam-box">
        <div id="loader-f" class="loading-overlay">正面AIロード中...</div>
        <select id="sel-f"></select>
        <div class="video-wrapper"><video id="v-face" autoplay playsinline muted></video><canvas id="c-face"></canvas></div>
    </div>
    <div class="cam-box">
        <div id="loader-h" class="loading-overlay">手元AI待機中...</div>
        <select id="sel-h"></select>
        <div class="video-wrapper"><video id="v-hand" autoplay playsinline muted></video><canvas id="c-hand"></canvas></div>
    </div>
</div>

<div class="controls">
    試行: <input type="number" id="trial" value="1" style="width:60px; padding:10px; border-radius:5px; text-align:center;">
    <button id="record-btn" disabled>AIロードを待機中...</button>
    <button id="dl-btn">CSV保存</button>
</div>

<div class="dashboard" id="dash">
    <div class="grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
        <div class="chart-container"><canvas id="gazeChart"></canvas></div>
        <div class="chart-container"><canvas id="pathChart"></canvas></div>
    </div>
    <div id="stat-summary" style="margin-top:20px; background:#2c3e50; padding:20px; border-radius:10px;"></div>
</div>

<script>
let faceMesh, hands;
let faceReady = false, handsReady = false;
let log = [];
let state = { gaze: "Center", rx: null, ry: null };
let charts = {};

// --- 1. AIエンジンの段階的ロード（メモリ不足対策） ---
async function initAI() {
    if (typeof window.FaceMesh === 'undefined') {
        setTimeout(initAI, 500); return;
    }

    try {
        // ステップ1: まず正面AIをロード
        document.getElementById('ai-status').innerText = "正面AIをロード中...";
        faceMesh = new window.FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5 });
        faceMesh.onResults(res => {
            if(!faceReady) { faceReady = true; document.getElementById('loader-f').style.display = 'none'; }
            const ctx = document.getElementById('c-face').getContext('2d');
            ctx.clearRect(0, 0, 640, 480);
            if (res.multiFaceLandmarks?.length > 0) {
                const n = res.multiFaceLandmarks[0][1];
                state.gaze = (n.x < 0.47 || n.x > 0.53) ? "Off-Center" : "Center";
                drawConnectors(ctx, res.multiFaceLandmarks[0], FACEMESH_TESSELATION, {color: '#C0C0C050', lineWidth: 1});
            }
        });

        // 正面AIの初期化を少し待ってから次へ
        await new Promise(r => setTimeout(r, 2000));

        // ステップ2: 手元AIをロード
        document.getElementById('ai-status').innerText = "手元AIをロード中...";
        document.getElementById('loader-h').innerText = "手元AIロード中...";
        hands = new window.Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5 });
        hands.onResults(res => {
            if(!handsReady) { handsReady = true; document.getElementById('loader-h').style.display = 'none'; checkAllReady(); }
            const ctx = document.getElementById('c-hand').getContext('2d');
            ctx.clearRect(0, 0, 640, 480);
            state.rx = state.ry = null;
            if (res.multiHandLandmarks) {
                res.multiHandLandmarks.forEach((lms, i) => {
                    if(res.multiHandedness[i].label === 'Right') { 
                        state.rx = (lms[9].x*100).toFixed(1); state.ry = ((1-lms[9].y)*100).toFixed(1); 
                    }
                    drawConnectors(ctx, lms, HAND_CONNECTIONS, {color: '#FF0000', lineWidth: 3});
                });
            }
        });

        initCameras();
    } catch (e) {
        document.getElementById('ai-status').innerText = "エラー: ページを更新してください。";
        console.error(e);
    }
}

function checkAllReady() {
    if(faceReady && handsReady) {
        document.getElementById('record-btn').disabled = false;
        document.getElementById('record-btn').innerText = "計測開始";
        document.getElementById('ai-status').innerText = "システム準備完了";
    }
}

// --- 2. カメラ・録画制御 ---
async function startStream(select, video) {
    if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({
        video: { deviceId: select.value ? { exact: select.value } : undefined, width: 640, height: 480 }
    });
    video.srcObject = stream;
}

const recordBtn = document.getElementById('record-btn');
let isRecording = false;

recordBtn.onclick = () => {
    isRecording = !isRecording;
    if (isRecording) {
        log = []; recordBtn.innerText = "停止";
        document.getElementById('dash').style.display = "none";
        document.getElementById('dl-btn').style.display = "none";
        timer = setInterval(() => { log.push({ ...state, ts: log.length }); }, 1000);
    } else {
        clearInterval(timer);
        recordBtn.innerText = "計測開始";
        document.getElementById('dl-btn').style.display = "inline-block";
        runAnalysis();
    }
};

function runAnalysis() {
    document.getElementById('dash').style.display = "block";
    const centers = log.filter(d => d.gaze === "Center").length;
    const rData = log.filter(d => d.rx !== null).map(d => ({x: d.rx, y: d.ry}));
    if(charts.g) charts.g.destroy();
    charts.g = new Chart(document.getElementById('gazeChart'), {
        type: 'pie',
        data: { labels: ['注視', '逸脱'], datasets: [{ data: [centers, log.length-centers], backgroundColor: ['#2ecc71', '#e74c3c'] }] }
    });
    if(charts.p) charts.p.destroy();
    charts.p = new Chart(document.getElementById('pathChart'), {
        type: 'scatter',
        data: { datasets: [{ label: '右手軌跡', data: rData, backgroundColor: 'red' }] },
        options: { scales: { x: { min: 0, max: 100 }, y: { min: 0, max: 100 } } }
    });
}

document.getElementById('dl-btn').onclick = () => {
    let csv = "Time,Gaze,RightX,RightY\n";
    log.forEach(d => csv += `${d.ts},${d.gaze},${d.rx},${d.ry}\n`);
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `SkillData_T${document.getElementById('trial').value}.csv`;
    a.click();
};

async function initCameras() {
    const devs = await navigator.mediaDevices.enumerateDevices();
    const vds = devs.filter(d => d.kind === 'videoinput');
    const selF = document.getElementById('sel-f');
    const selH = document.getElementById('sel-h');
    vds.forEach((d, i) => {
        selF.add(new Option(d.label || `CAM ${i}`, d.deviceId));
        selH.add(new Option(d.label || `CAM ${i}`, d.deviceId));
    });
    const vf = document.getElementById('v-face');
    const vh = document.getElementById('v-hand');
    await startStream(selF, vf);
    if(vds.length > 1) { selH.selectedIndex = 1; setTimeout(() => startStream(selH, vh), 1500); }
    function loop() {
        if(faceReady && vf.readyState >= 2) faceMesh.send({image: vf}).catch(()=>{});
        if(handsReady && vh.readyState >= 2) hands.send({image: vh}).catch(()=>{});
        requestAnimationFrame(loop);
    }
    loop();
}
window.onload = initAI;
</script>
</body>
</html>
