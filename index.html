<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>技能分析 - 手のひら中心・腕排除版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js"></script>
  <style>
    body { font-family: sans-serif; background: #f0f2f5; text-align: center; margin: 0; padding-bottom: 150px; }
    .container { display: flex; justify-content: center; gap: 10px; padding: 10px; flex-wrap: wrap; }
    .box { background: white; padding: 15px; border-radius: 15px; width: 340px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .video-wrap { position: relative; width: 320px; height: 240px; background: #000; border-radius: 10px; overflow: hidden; }
    video { display: none; } 
    canvas { position: absolute; top: 0; left: 0; width: 320px; height: 240px; }
    .status { background: #f1f3f4; padding: 10px; border-radius: 8px; font-size: 12px; margin-top: 10px; text-align: left; min-height: 80px; }
    .controls { background: rgba(255,255,255,0.9); padding: 20px; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #ddd; z-index: 1000; }
    button { padding: 12px 40px; font-size: 16px; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; }
    #startBtn { background: #1a73e8; color: white; }
    #stopBtn { background: #ea4335; color: white; margin-left: 10px; }
    .active-tag { color: #d93025; font-weight: bold; animation: blink 1s infinite; }
    @keyframes blink { 0% {opacity:1;} 50% {opacity:0.5;} 100% {opacity:1;} }
  </style>
</head>
<body>

<h2 style="margin-top:20px;">技能習得分析：手のひら中心(腕排除)システム</h2>

<div class="container">
  <div class="box">
    <h3 style="color:#1a73e8;">① 視線解析 (65cm対応)</h3>
    <select id="sel1" style="width:100%; margin-bottom:10px;"></select>
    <div class="video-wrap">
      <video id="v1" autoplay playsinline muted></video>
      <canvas id="c1" width="320" height="240"></canvas>
    </div>
    <div class="status">偏差Y: <span id="yVal">-</span><br>視線座標: <span id="gWStatus">-</span></div>
  </div>

  <div class="box">
    <h3 style="color:#ea4335;">② 手元解析 (手のひら中心)</h3>
    <select id="sel2" style="width:100%; margin-bottom:10px;"></select>
    <div class="video-wrap">
      <video id="v2" autoplay playsinline muted></video>
      <canvas id="c2" width="320" height="240"></canvas>
    </div>
    <div class="status">
      左手: <span id="lHStatus">待機中</span><br>
      右手: <span id="rHStatus">待機中</span><br>
      手眼シンクロ距離: <span id="distStatus" style="font-weight:bold; color:red;">-</span>
    </div>
  </div>
</div>

<div class="controls">
  試行：第 <input type="number" id="trialNum" value="1" style="width:50px; font-size:18px;"> 回目
  <button id="startBtn" disabled>記録開始</button>
  <button id="stopBtn" disabled>保存して終了</button>
  <p id="msg" style="margin-top:5px; font-size:11px; color:#666;">手のひらの中央（中指付け根）を瞬時に捉え、腕の動きを無視します。</p>
</div>

<script type="module">
  import { FaceLandmarker, HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

  let faceLM, handLM;
  let isRec = false, dataLog = [];
  let gazeW = {x:0.5, y:0.5}, hL = {x:0, y:0}, hR = {x:0, y:0};
  
  // 65cm距離・X50 Y65領域に最適化した感度
  const GAZE_SENS_X = 5.0; 
  const GAZE_SENS_Y = 6.5; 

  const v1 = document.getElementById("v1"), v2 = document.getElementById("v2");
  const ctx1 = document.getElementById("c1").getContext("2d"), ctx2 = document.getElementById("c2").getContext("2d");

  async function setup() {
    try {
      const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
      faceLM = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task" },
        runningMode: "VIDEO"
      });
      // 手のひら中心検知用にHandLandmarkerを高速設定で起動
      handLM = await HandLandmarker.createFromOptions(vision, {
        baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task" },
        runningMode: "VIDEO", numHands: 2, minHandDetectionConfidence: 0.4
      });
      const vids = (await navigator.mediaDevices.enumerateDevices()).filter(d => d.kind === 'videoinput');
      vids.forEach((v, i) => { 
          document.getElementById("sel1").add(new Option(v.label||`Cam ${i+1}`, v.deviceId)); 
          document.getElementById("sel2").add(new Option(v.label||`Cam ${i+1}`, v.deviceId)); 
      });
      if(vids.length > 1) document.getElementById("sel2").selectedIndex = 1;
      document.getElementById("startBtn").disabled = false;
    } catch (e) { document.getElementById("msg").innerText = "エラー: AIを起動できません"; }
  }

  async function startCam(vEl, id) {
    if(vEl.srcObject) vEl.srcObject.getTracks().forEach(t => t.stop());
    vEl.srcObject = await navigator.mediaDevices.getUserMedia({ video: { deviceId: {exact:id}, width: 320, height: 240 } });
  }

  document.getElementById("startBtn").onclick = async () => {
    await startCam(v1, document.getElementById("sel1").value);
    await startCam(v2, document.getElementById("sel2").value);
    isRec = true;
    dataLog = [["Trial","Time","Gaze_X","Gaze_Y","LH_X","LH_Y","RH_X","RH_Y","Dist"]];
    document.getElementById("stopBtn").disabled = false;
    render();
  };

  function render() {
    const now = performance.now();
    
    // ① 視線解析
    if(v1.readyState >= 2) {
      ctx1.drawImage(v1, 0, 0, 320, 240);
      const resF = faceLM.detectForVideo(v1, now);
      if(resF.faceLandmarks && resF.faceLandmarks.length > 0) {
        const iris = resF.faceLandmarks[0][468];
        gazeW.x = Math.max(0, Math.min(1, 0.5 + (iris.x - 0.5) * GAZE_SENS_X));
        gazeW.y = Math.max(0, Math.min(1, 0.5 + (iris.y - 0.45) * GAZE_SENS_Y));
        document.getElementById("yVal").innerText = ((iris.y-0.45)*100).toFixed(1);
        document.getElementById("gWStatus").innerText = `X:${gazeW.x.toFixed(2)} Y:${gazeW.y.toFixed(2)}`;
      }
    }

    // ② 手元解析 (手のひら中心に特化)
    if(v2.readyState >= 2) {
      ctx2.drawImage(v2, 0, 0, 320, 240);
      const resH = handLM.detectForVideo(v2, now);
      
      let foundL = false, foundR = false;

      if(resH.landmarks && resH.landmarks.length > 0) {
        resH.landmarks.forEach((lm, idx) => {
          const label = resH.handedness[idx][0].categoryName;
          // 手のひらの物理的な中心点として「中指の付け根(Landmark 9)」を使用
          // これにより腕（手首より下）がどれだけ映っても、点は手のひらに固定される
          const p = lm[9]; 

          if(label === 'Left') {
            hL = {x:p.x, y:p.y}; foundL = true;
            ctx2.fillStyle = "rgba(255, 0, 0, 0.8)"; ctx2.beginPath(); ctx2.arc(hL.x*320, hL.y*240, 15, 0, 7); ctx2.fill();
            document.getElementById("lHStatus").innerHTML = `<span class="active-tag">検知中 (X:${hL.x.toFixed(2)})</span>`;
          } else {
            hR = {x:p.x, y:p.y}; foundR = true;
            ctx2.fillStyle = "rgba(0, 0, 255, 0.8)"; ctx2.beginPath(); ctx2.arc(hR.x*320, hR.y*240, 15, 0, 7); ctx2.fill();
            document.getElementById("rHStatus").innerHTML = `<span class="active-tag">検知中 (X:${hR.x.toFixed(2)})</span>`;
          }
        });
      }

      if(!foundL) document.getElementById("lHStatus").innerText = "待機中";
      if(!foundR) document.getElementById("rHStatus").innerText = "待機中";

      if(foundR) {
        const d = Math.sqrt(Math.pow(gazeW.x-hR.x,2) + Math.pow(gazeW.y-hR.y,2));
        document.getElementById("distStatus").innerText = d.toFixed(3);
        if(isRec) dataLog.push([document.getElementById("trialNum").value, (now/1000).toFixed(2), gazeW.x.toFixed(3), gazeW.y.toFixed(3), hL.x.toFixed(3), hL.y.toFixed(3), hR.x.toFixed(3), hR.y.toFixed(3), d.toFixed(4)]);
      }
      
      // 視線注視点（緑）を表示
      ctx2.fillStyle = "lime"; ctx2.beginPath(); ctx2.arc(gazeW.x*320, gazeW.y*240, 6, 0, 7); ctx2.fill();
    }
    requestAnimationFrame(render);
  }

  document.getElementById("stopBtn").onclick = () => {
    isRec = false;
    const csv = "\ufeff" + dataLog.map(e => e.join(",")).join("\n");
    const link = document.createElement("a");
    link.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
    link.download = `lego_palm_trial_${document.getElementById("trialNum").value}.csv`;
    link.click();
    document.getElementById("trialNum").value = parseInt(document.getElementById("trialNum").value) + 1;
  };
  setup();
</script>
</body>
</html>
