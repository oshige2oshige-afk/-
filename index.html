<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>技能分析 - 高精度手のひらトラッキング版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; text-align: center; margin: 0; padding-bottom: 150px; }
    .container { display: flex; justify-content: center; gap: 15px; padding: 20px; flex-wrap: wrap; }
    .box { background: white; padding: 15px; border-radius: 20px; width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid #e0e0e0; }
    .video-wrap { position: relative; width: 400px; height: 300px; background: #222; border-radius: 12px; overflow: hidden; }
    video { display: none; } 
    canvas { position: absolute; top: 0; left: 0; width: 400px; height: 300px; }
    .status { background: #f8f9fa; padding: 12px; border-radius: 10px; font-size: 13px; margin-top: 10px; text-align: left; border-left: 5px solid #1a73e8; }
    .controls { background: rgba(255,255,255,0.95); padding: 20px; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #ddd; z-index: 1000; display: flex; align-items: center; justify-content: center; gap: 20px; }
    button { padding: 12px 30px; font-size: 16px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
    #startBtn { background: #1a73e8; color: white; }
    #startBtn:hover { background: #1557b0; }
    #stopBtn { background: #ea4335; color: white; }
    .active-tag { color: #d93025; font-weight: bold; }
    .label-box { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.5); color: white; padding: 2px 8px; border-radius: 5px; font-size: 12px; }
  </style>
</head>
<body>

<h2 style="margin-top:20px;">高精度技能習得分析：手のひら重心追従システム</h2>

<div class="container">
  <!-- 視線解析側 -->
  <div class="box">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <h3 style="color:#1a73e8; margin:0;">① 視線解析</h3>
      <select id="sel1" style="padding:5px; border-radius:5px;"></select>
    </div>
    <div class="video-wrap">
      <video id="v1" autoplay playsinline muted></video>
      <canvas id="c1" width="400" height="300"></canvas>
      <div class="label-box">EYE TRACKING</div>
    </div>
    <div class="status">
      視線座標: <span id="gWStatus">-</span><br>
      偏差感度: X5.0 / Y6.5 (65cm)
    </div>
  </div>

  <!-- 手元解析側 -->
  <div class="box">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <h3 style="color:#ea4335; margin:0;">② 手のひら重心解析</h3>
      <select id="sel2" style="padding:5px; border-radius:5px;"></select>
    </div>
    <div class="video-wrap">
      <video id="v2" autoplay playsinline muted></video>
      <canvas id="c2" width="400" height="300"></canvas>
      <div class="label-box">PALM TRACKING</div>
    </div>
    <div class="status">
      左手重心: <span id="lHStatus">待機中</span><br>
      右手重心: <span id="rHStatus">待機中</span><br>
      同期距離: <span id="distStatus" style="font-weight:bold; color:#d93025; font-size:1.2em;">-</span>
    </div>
  </div>
</div>

<div class="controls">
  <span>試行：<input type="number" id="trialNum" value="1" style="width:50px; font-size:18px; padding:5px;"> 回目</span>
  <button id="startBtn" disabled>記録開始</button>
  <button id="stopBtn" disabled>保存して終了</button>
</div>

<script type="module">
  import { FaceLandmarker, HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

  let faceLM, handLM;
  let isRec = false, dataLog = [];
  let gazeW = {x:0.5, y:0.5};
  
  // スムージング用変数 (0.0〜1.0 低いほど滑らか、高いほど高速追従)
  const SMOOTHING = 0.35;
  let hL = {x:0.5, y:0.5}, hR = {x:0.5, y:0.5};

  const v1 = document.getElementById("v1"), v2 = document.getElementById("v2");
  const ctx1 = document.getElementById("c1").getContext("2d"), ctx2 = document.getElementById("c2").getContext("2d");

  async function setup() {
    try {
      const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
      faceLM = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task" },
        runningMode: "VIDEO"
      });
      handLM = await HandLandmarker.createFromOptions(vision, {
        baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task" },
        runningMode: "VIDEO", numHands: 2, 
        minHandDetectionConfidence: 0.6, // 判定精度を少し上げる
        minHandPresenceConfidence: 0.6
      });
      const vids = (await navigator.mediaDevices.enumerateDevices()).filter(d => d.kind === 'videoinput');
      vids.forEach((v, i) => { 
          document.getElementById("sel1").add(new Option(v.label||`Cam ${i+1}`, v.deviceId)); 
          document.getElementById("sel2").add(new Option(v.label||`Cam ${i+1}`, v.deviceId)); 
      });
      if(vids.length > 1) document.getElementById("sel2").selectedIndex = 1;
      document.getElementById("startBtn").disabled = false;
    } catch (e) { alert("AIモデルのロードに失敗しました"); }
  }

  // 指数平滑化フィルタ関数
  function lerp(oldVal, newVal) {
    return oldVal + (newVal - oldVal) * SMOOTHING;
  }

  async function startCam(vEl, id) {
    if(vEl.srcObject) vEl.srcObject.getTracks().forEach(t => t.stop());
    vEl.srcObject = await navigator.mediaDevices.getUserMedia({ video: { deviceId: {exact:id}, width: 640, height: 480 } });
  }

  document.getElementById("startBtn").onclick = async () => {
    await startCam(v1, document.getElementById("sel1").value);
    await startCam(v2, document.getElementById("sel2").value);
    isRec = true;
    dataLog = [["Trial","Time","Gaze_X","Gaze_Y","LH_X","LH_Y","RH_X","RH_Y","Dist"]];
    document.getElementById("stopBtn").disabled = false;
    render();
  };

  function render() {
    if(!isRec) return;
    const now = performance.now();
    
    // ① 視線解析
    if(v1.readyState >= 2) {
      ctx1.drawImage(v1, 0, 0, 400, 300);
      const resF = faceLM.detectForVideo(v1, now);
      if(resF.faceLandmarks && resF.faceLandmarks.length > 0) {
        const iris = resF.faceLandmarks[0][468];
        gazeW.x = Math.max(0, Math.min(1, 0.5 + (iris.x - 0.5) * 5.0));
        gazeW.y = Math.max(0, Math.min(1, 0.5 + (iris.y - 0.45) * 6.5));
        document.getElementById("gWStatus").innerText = `X:${gazeW.x.toFixed(2)} Y:${gazeW.y.toFixed(2)}`;
        // 視線マーカー
        ctx1.fillStyle = "#00ff00";
        ctx1.beginPath(); ctx1.arc(iris.x*400, iris.y*300, 4, 0, 7); ctx1.fill();
      }
    }

    // ② 手元解析 (手のひら重心・スムージング適用)
    if(v2.readyState >= 2) {
      ctx2.drawImage(v2, 0, 0, 400, 300);
      const resH = handLM.detectForVideo(v2, now);
      
      let foundL = false, foundR = false;

      if(resH.landmarks && resH.landmarks.length > 0) {
        resH.landmarks.forEach((lm, idx) => {
          const label = resH.handedness[idx][0].categoryName;
          
          // 【改良】手のひらの「重心」を計算
          // 手首(0), 人差し指付け根(5), 中指付け根(9), 小指付け根(17)の平均をとる
          // これにより、腕がどう動いても手のひらの中央が安定する
          const palmPoints = [lm[0], lm[5], lm[9], lm[17]];
          const rawX = palmPoints.reduce((s, p) => s + p.x, 0) / 4;
          const rawY = palmPoints.reduce((s, p) => s + p.y, 0) / 4;

          if(label === 'Left') {
            hL.x = lerp(hL.x, rawX); hL.y = lerp(hL.y, rawY);
            foundL = true;
            drawPalmMarker(ctx2, hL, "#ff3333");
            document.getElementById("lHStatus").innerHTML = `<span class="active-tag">追従中</span> (X:${hL.x.toFixed(2)})`;
          } else {
            hR.x = lerp(hR.x, rawX); hR.y = lerp(hR.y, rawY);
            foundR = true;
            drawPalmMarker(ctx2, hR, "#3333ff");
            document.getElementById("rHStatus").innerHTML = `<span class="active-tag">追従中</span> (X:${hR.x.toFixed(2)})`;
          }
        });
      }

      if(!foundL) document.getElementById("lHStatus").innerText = "待機中";
      if(!foundR) document.getElementById("rHStatus").innerText = "待機中";

      // 視線注視点のフィードバック（緑の十字）
      ctx2.strokeStyle = "lime"; ctx2.lineWidth = 2;
      const gx = gazeW.x * 400, gy = gazeW.y * 300;
      ctx2.beginPath(); ctx2.moveTo(gx-15, gy); ctx2.lineTo(gx+15, gy); ctx2.stroke();
      ctx2.beginPath(); ctx2.moveTo(gx, gy-15); ctx2.lineTo(gx, gy+15); ctx2.stroke();

      // 同期距離の計算（右手と視線）
      if(foundR) {
        const d = Math.sqrt(Math.pow(gazeW.x-hR.x,2) + Math.pow(gazeW.y-hR.y,2));
        document.getElementById("distStatus").innerText = d.toFixed(3);
        if(isRec) dataLog.push([
            document.getElementById("trialNum").value, 
            (now/1000).toFixed(2), 
            gazeW.x.toFixed(3), gazeW.y.toFixed(3), 
            hL.x.toFixed(3), hL.y.toFixed(3), 
            hR.x.toFixed(3), hR.y.toFixed(3), 
            d.toFixed(4)
        ]);
      }
    }
    requestAnimationFrame(render);
  }

  // 手のひら用特殊マーカーの描画
  function drawPalmMarker(ctx, pos, color) {
    ctx.shadowBlur = 10; ctx.shadowColor = color;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(pos.x*400, pos.y*300, 12, 0, Math.PI*2);
    ctx.fill();
    // 中心点
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(pos.x*400, pos.y*300, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  document.getElementById("stopBtn").onclick = () => {
    isRec = false;
    const csv = "\ufeff" + dataLog.map(e => e.join(",")).join("\n");
    const link = document.createElement("a");
    link.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
    link.download = `skill_analysis_p_trial_${document.getElementById("trialNum").value}.csv`;
    link.click();
    document.getElementById("trialNum").value = parseInt(document.getElementById("trialNum").value) + 1;
    document.getElementById("stopBtn").disabled = true;
  };
  setup();
</script>
</body>
</html>
