<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDS-DMA Web: 技能分析システム（安定版）</title>
    
    <!-- MediaPipe ライブラリ: バージョンを0.4に固定して一貫性を持たせる -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --main-red: #e74c3c; --main-blue: #3498db; --bg-dark: #121212; --card-bg: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; padding-bottom: 150px; }
        header { background: #000; padding: 15px; text-align: center; border-bottom: 3px solid var(--main-red); }
        .main-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .cam-box { background: var(--card-bg); border: 2px solid #333; border-radius: 12px; padding: 15px; width: 450px; text-align: center; position: relative; }
        .video-wrapper { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 8px; overflow: hidden; margin-top: 10px; }
        video { display: none; } /* 解析用。画面には表示しない */
        canvas { width: 100%; height: 100%; border-radius: 8px; background: #000; }

        .controls { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.95); padding: 20px; display: flex; justify-content: center; align-items: center; gap: 20px; border-top: 1px solid #444; z-index: 1000; }
        button { padding: 12px 35px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; border-radius: 50px; transition: 0.3s; }
        #record-btn { background: var(--main-red); color: white; }
        #record-btn:disabled { background: #555; cursor: not-allowed; }
        #dl-btn { background: #2ecc71; color: white; display: none; }

        .dashboard { width: 95%; max-width: 1200px; margin: 30px auto; display: none; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 30px; }
        .chart-box { background: #fff; padding: 20px; border-radius: 15px; height: 400px; }
        
        .status-tag { position: absolute; top: 25px; right: 25px; background: rgba(0,0,0,0.7); padding: 4px 10px; border-radius: 4px; font-size: 14px; color: #0f0; z-index: 10; border: 1px solid #0f0; }
        select { background: #333; color: white; border: 1px solid #555; padding: 5px; border-radius: 5px; width: 80%; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <h1>TDS-DMA Web Analysis</h1>
    <div id="ai-status" style="color: #f1c40f;">AIライブラリをロード中...</div>
</header>

<div class="main-container">
    <div class="cam-box">
        <div class="status-tag" id="face-info">Face: Wait</div>
        <select id="sel-f"></select>
        <div class="video-wrapper">
            <video id="v-face" autoplay playsinline muted></video>
            <canvas id="c-face"></canvas>
        </div>
    </div>
    <div class="cam-box">
        <div class="status-tag" id="hand-info">Hands: Wait</div>
        <select id="sel-h"></select>
        <div class="video-wrapper">
            <video id="v-hand" autoplay playsinline muted></video>
            <canvas id="c-hand"></canvas>
        </div>
    </div>
</div>

<div class="controls">
    Trial: <input type="text" id="trial" value="T001" style="width:70px; padding:10px; text-align:center;">
    <button id="record-btn" disabled>AI起動待機中...</button>
    <button id="dl-btn">CSV保存</button>
</div>

<div class="dashboard" id="dash">
    <div class="grid-container">
        <div class="chart-box"><canvas id="gazeChart"></canvas></div>
        <div class="chart-box"><canvas id="pathChart"></canvas></div>
    </div>
</div>

<script>
let faceMesh, hands;
let faceActive = false, handsActive = false;
let log = [];
let state = { gaze: "Center", lx: null, ly: null, rx: null, ry: null };
let charts = {};
let timer = null;
let seconds = 0;

// バージョン固定用パス
const HANDS_PATH = "https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4";
const FACEMESH_PATH = "https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4";

async function initAI() {
    try {
        // FaceMesh初期化
        faceMesh = new FaceMesh({ locateFile: (file) => `${FACEMESH_PATH}/${file}` });
        faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        faceMesh.onResults(onFaceResults);

        // Hands初期化
        hands = new Hands({ locateFile: (file) => `${HANDS_PATH}/${file}` });
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults(onHandResults);

        await initCameras();
    } catch (e) { 
        document.getElementById('ai-status').innerText = "初期化失敗: " + e.message;
        console.error("AI Init Error:", e);
    }
}

function onFaceResults(res) {
    if (!faceActive) { faceActive = true; checkReady(); }
    const canvas = document.getElementById('c-face');
    const ctx = canvas.getContext('2d');
    
    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // 鏡表示
    ctx.scale(-1, 1);
    ctx.translate(-canvas.width, 0);
    ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);
    ctx.restore();

    if (res.multiFaceLandmarks?.length > 0) {
        const n = res.multiFaceLandmarks[0][1]; 
        state.gaze = (n.x < 0.44 || n.x > 0.56) ? "Off-Center" : "Center";
        document.getElementById('face-info').innerText = `Face: ${state.gaze}`;
        
        if (window.drawConnectors && window.FACEMESH_TESSELATION) {
            drawConnectors(ctx, res.multiFaceLandmarks[0], FACEMESH_TESSELATION, {color: '#C0C0C070', lineWidth: 1});
        }
    }
}

function onHandResults(res) {
    if (!handsActive) { handsActive = true; checkReady(); }
    const canvas = document.getElementById('c-hand');
    const ctx = canvas.getContext('2d');
    
    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.scale(-1, 1);
    ctx.translate(-canvas.width, 0);
    ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);
    ctx.restore();

    state.lx = state.ly = state.rx = state.ry = null;

    if (res.multiHandLandmarks) {
        for (let i = 0; i < res.multiHandLandmarks.length; i++) {
            const lms = res.multiHandLandmarks[i];
            const label = res.multiHandedness[i].label;

            // 鏡像補正後の座標
            const x = ((1 - lms[9].x) * 100).toFixed(1); 
            const y = (lms[9].y * 100).toFixed(1);

            if (label === "Right") { state.rx = x; state.ry = y; } 
            else { state.lx = x; state.ly = y; }

            if (window.drawConnectors && window.HAND_CONNECTIONS) {
                drawConnectors(ctx, lms, HAND_CONNECTIONS, {
                    color: label === "Right" ? '#e74c3c' : '#3498db', lineWidth: 4
                });
            }
        }
        document.getElementById('hand-info').innerText = `Hands: ${res.multiHandLandmarks.length}`;
    }
}

function checkReady() {
    const btn = document.getElementById('record-btn');
    if(faceActive && handsActive) {
        btn.disabled = false;
        btn.innerText = "計測開始";
        document.getElementById('ai-status').innerText = "AI稼働中";
        document.getElementById('ai-status').style.color = "#2ecc71";
    }
}

async function initCameras() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vds = devices.filter(d => d.kind === 'videoinput');
    const selF = document.getElementById('sel-f');
    const selH = document.getElementById('sel-h');
    
    vds.forEach((d, i) => {
        selF.add(new Option(d.label || `Cam ${i}`, d.deviceId));
        selH.add(new Option(d.label || `Cam ${i}`, d.deviceId));
    });
    if (vds.length > 1) selH.selectedIndex = 1;

    const vf = document.getElementById('v-face');
    const vh = document.getElementById('v-hand');

    async function stream(videoEl, id, canvasId) {
        const s = await navigator.mediaDevices.getUserMedia({video: {deviceId: id ? {exact: id} : undefined, width: 640, height: 480}});
        videoEl.srcObject = s;
        document.getElementById(canvasId).width = 640;
        document.getElementById(canvasId).height = 480;
    }

    await stream(vf, selF.value, 'c-face');
    await stream(vh, selH.value, 'c-hand');

    function loop() {
        if(vf.readyState >= 2) faceMesh.send({image: vf}).catch(e => console.warn("FaceMesh send error:", e));
        if(vh.readyState >= 2) hands.send({image: vh}).catch(e => console.warn("Hands send error:", e));
        requestAnimationFrame(loop);
    }
    loop();
}

const btn = document.getElementById('record-btn');
btn.onclick = () => {
    if (!timer) {
        log = []; seconds = 0;
        timer = setInterval(() => { log.push({ t: seconds++, ...state }); }, 1000);
        btn.innerText = "停止";
        btn.style.background = "#555";
        document.getElementById('dash').style.display = "none";
        document.getElementById('dl-btn').style.display = "none";
    } else {
        clearInterval(timer);
        timer = null;
        btn.innerText = "計測開始";
        btn.style.background = "var(--main-red)";
        document.getElementById('dl-btn').style.display = "inline-block";
        showCharts();
    }
};

function showCharts() {
    document.getElementById('dash').style.display = "block";
    const centers = log.filter(d => d.gaze === "Center").length;
    const total = log.length || 1;

    if(charts.g) charts.g.destroy();
    charts.g = new Chart(document.getElementById('gazeChart'), {
        type: 'pie',
        data: { labels: ['正面', '逸脱'], datasets: [{ data: [centers, total-centers], backgroundColor: ['#2ecc71', '#e74c3c'] }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: '視線集中度' } } }
    });

    if(charts.p) charts.p.destroy();
    charts.p = new Chart(document.getElementById('pathChart'), {
        type: 'scatter',
        data: {
            datasets: [
                { label: '左手 (Blue)', data: log.filter(d => d.lx).map(d => ({x: d.lx, y: d.ly})), backgroundColor: '#3498db' },
                { label: '右手 (Red)', data: log.filter(d => d.rx).map(d => ({x: d.rx, y: d.ry})), backgroundColor: '#e74c3c' }
            ]
        },
        options: { 
            responsive: true, maintainAspectRatio: false,
            scales: { x: { min: 0, max: 100 }, y: { min: 0, max: 100, reverse: true } }, 
            plugins: { title: { display: true, text: '作業エリア内配置' } } 
        }
    });
}

document.getElementById('dl-btn').onclick = () => {
    let csv = "Time(sec),Gaze,LeftX,LeftY,RightX,RightY\n";
    log.forEach(d => csv += `${d.t},${d.gaze},${d.lx||''},${d.ly||''},${d.rx||''},${d.ry||''}\n`);
    const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], {type: 'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${document.getElementById('trial').value}_Data.csv`;
    a.click();
};

window.onload = initAI;
</script>
</body>
</html>
