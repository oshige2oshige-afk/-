<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>技能分析 - 視線フレーム・両手同期版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <style>
    body { font-family: sans-serif; background: #f0f2f5; text-align: center; margin: 0; padding-bottom: 150px; }
    .container { display: flex; justify-content: center; gap: 10px; padding: 10px; flex-wrap: wrap; }
    .box { background: white; padding: 15px; border-radius: 15px; width: 340px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .video-wrap { position: relative; width: 320px; height: 240px; background: #000; border-radius: 10px; overflow: hidden; }
    video { display: none; } 
    canvas { position: absolute; top: 0; left: 0; width: 320px; height: 240px; }
    .status { background: #f1f3f4; padding: 10px; border-radius: 8px; font-size: 12px; margin-top: 10px; text-align: left; min-height: 70px; }
    .controls { background: white; padding: 20px; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #ddd; z-index: 1000; }
    button { padding: 10px 20px; font-size: 15px; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; margin: 0 5px; }
    #autoBtn { background: #34a853; color: white; }
    #startBtn { background: #1a73e8; color: white; }
    #stopBtn { background: #ea4335; color: white; }
  </style>
</head>
<body>

<h2 style="margin-top:20px;">レゴ分析：視線フレーム・両手座標同期</h2>

<div class="container">
  <div class="box">
    <h3 style="color:#1a73e8;">① 視線解析 (Eye Frame)</h3>
    <select id="sel1" style="width:100%; margin-bottom:10px;"></select>
    <div class="video-wrap">
      <video id="v1" autoplay playsinline muted></video>
      <canvas id="c1" width="320" height="240"></canvas>
    </div>
    <div class="status">視線方向: <span id="res1">-</span> / Y偏差: <span id="yVal">-</span></div>
  </div>

  <div class="box">
    <h3 style="color:#ea4335;">② 手元動作解析 (俯瞰)</h3>
    <select id="sel2" style="width:100%; margin-bottom:10px;"></select>
    <div class="video-wrap">
      <video id="v2" autoplay playsinline muted></video>
      <canvas id="c2" width="320" height="240"></canvas>
    </div>
    <div class="status">
      左手(赤): <span id="lH">-</span><br>
      右手(青): <span id="rH">-</span><br>
      手眼距離: <span id="distStatus" style="font-weight:bold; color:red;">-</span>
    </div>
  </div>
</div>

<div class="controls">
  試行：第 <input type="number" id="trialNum" value="1" style="width:40px;"> 回
  <button id="autoBtn">枠を自動認識</button>
  <button id="startBtn" disabled>記録開始</button>
  <button id="stopBtn" disabled>保存して終了</button>
</div>

<script type="module">
  import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

  let faceLM, isRec = false;
  let dataLog = [];
  let roi = { x: 50, y: 40, w: 220, h: 160 }; 
  let gazeW = {x:0.5, y:0.5}, hL = {x:0, y:0}, hR = {x:0, y:0};

  const v1 = document.getElementById("v1"), v2 = document.getElementById("v2");
  const ctx1 = document.getElementById("c1").getContext("2d"), ctx2 = document.getElementById("c2").getContext("2d");

  async function setup() {
    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
    faceLM = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task" },
      runningMode: "VIDEO", outputFaceBlendshapes: true
    });
    const vids = (await navigator.mediaDevices.enumerateDevices()).filter(d => d.kind === 'videoinput');
    vids.forEach((v, i) => { 
        document.getElementById("sel1").add(new Option(v.label||`Cam ${i+1}`, v.deviceId)); 
        document.getElementById("sel2").add(new Option(v.label||`Cam ${i+1}`, v.deviceId)); 
    });
    if(vids.length > 1) document.getElementById("sel2").selectedIndex = 1;
    document.getElementById("startBtn").disabled = false;
  }

  document.getElementById("autoBtn").onclick = async () => {
    await startCam(v2, document.getElementById("sel2").value);
    setTimeout(() => {
      ctx2.drawImage(v2, 0, 0, 320, 240);
      const data = ctx2.getImageData(0, 0, 320, 240).data;
      let minX = 320, maxX = 0, minY = 240, maxY = 0, found = false;
      for(let i=0; i<data.length; i+=16) {
        if(data[i] > 190 && data[i+1] > 190 && data[i+2] > 190) {
          const x = (i/4)%320, y = Math.floor((i/4)/320);
          if(x < minX) minX = x; if(x > maxX) maxX = x; if(y < minY) minY = y; if(y > maxY) maxY = y;
          found = true;
        }
      }
      if(found) roi = { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
    }, 1000);
  };

  async function startCam(vEl, id) {
    if(vEl.srcObject) vEl.srcObject.getTracks().forEach(t => t.stop());
    vEl.srcObject = await navigator.mediaDevices.getUserMedia({ video: { deviceId: {exact:id}, width: 320, height: 240 } });
  }

  document.getElementById("startBtn").onclick = async () => {
    await startCam(v1, document.getElementById("sel1").value);
    isRec = true;
    dataLog = [["Trial","Time","Gaze_X","Gaze_Y","LH_X","LH_Y","RH_X","RH_Y","Dist"]];
    document.getElementById("stopBtn").disabled = false;
    render();
  };

  function render() {
    const now = performance.now();
    
    // ① 視線解析 & 目のフレーム描画
    if(v1.readyState >= 2) {
      ctx1.drawImage(v1, 0, 0, 320, 240);
      const res = faceLM.detectForVideo(v1, now);
      if(res.faceLandmarks && res.faceLandmarks.length > 0) {
        const landmarks = res.faceLandmarks[0];
        // 目の周りのフレーム（コネクタ）を描画
        window.drawConnectors(ctx1, landmarks, FaceLandmarker.FACE_LANDMARKS_RIGHT_EYE, {color: '#00FF00', lineWidth: 1});
        window.drawConnectors(ctx1, landmarks, FaceLandmarker.FACE_LANDMARKS_LEFT_EYE, {color: '#00FF00', lineWidth: 1});
        window.drawConnectors(ctx1, landmarks, FaceLandmarker.FACE_LANDMARKS_RIGHT_IRIS, {color: '#FF0000', lineWidth: 1});
        window.drawConnectors(ctx1, landmarks, FaceLandmarker.FACE_LANDMARKS_LEFT_IRIS, {color: '#FF0000', lineWidth: 1});

        const iris = landmarks[468];
        gazeW.x = Math.max(0, Math.min(1, 0.5 + (iris.x - 0.5) * 4));
        gazeW.y = Math.max(0, Math.min(1, 0.5 + (iris.y - 0.45) * 4));
        document.getElementById("yVal").innerText = ((iris.y-0.45)*100).toFixed(1);
      }
    }

    if(!isRec) {
      if(v2.readyState >= 2) {
        ctx2.drawImage(v2, 0, 0, 320, 240); ctx2.strokeStyle = "red"; ctx2.strokeRect(roi.x, roi.y, roi.w, roi.h);
      }
      requestAnimationFrame(render); return;
    }

    // ② 手元動作解析
    if(v2.readyState >= 2) {
      ctx2.drawImage(v2, 0, 0, 320, 240); ctx2.strokeStyle = "red"; ctx2.strokeRect(roi.x, roi.y, roi.w, roi.h);
      const img = ctx2.getImageData(roi.x, roi.y, roi.w, roi.h).data;
      let lpx=0, lpy=0, lc=0, rpx=0, rpy=0, rc=0;
      for(let i=0; i<img.length; i+=16) {
        if(img[i] > 100 && img[i] > img[i+1] && img[i+1] > 40) {
          const x = (i/4)%roi.w, y = Math.floor((i/4)/roi.w);
          if(x < roi.w/2) { lpx+=x; lpy+=y; lc++; } else { rpx+=x; rpy+=y; rc++; }
        }
      }
      hL = lc > 5 ? {x:lpx/lc/roi.w, y:lpy/lc/roi.h} : {x:0, y:0};
      hR = rc > 5 ? {x:rpx/rc/roi.w, y:rpy/rc/roi.h} : {x:0, y:0};
      ctx2.fillStyle = "red"; ctx2.beginPath(); ctx2.arc(roi.x+hL.x*roi.w, roi.y+hL.y*roi.h, 10,0,7); ctx2.fill();
      ctx2.fillStyle = "blue"; ctx2.beginPath(); ctx2.arc(roi.x+hR.x*roi.w, roi.y+hR.y*roi.h, 10,0,7); ctx2.fill();
      
      const d = Math.sqrt(Math.pow(gazeW.x-hR.x,2)+Math.pow(gazeW.y-hR.y,2));
      document.getElementById("lH").innerText = `X:${hL.x.toFixed(2)} Y:${hL.y.toFixed(2)}`;
      document.getElementById("rH").innerText = `X:${hR.x.toFixed(2)} Y:${hR.y.toFixed(2)}`;
      document.getElementById("distStatus").innerText = d.toFixed(3);
      dataLog.push([document.getElementById("trialNum").value, (now/1000).toFixed(2), gazeW.x.toFixed(3), gazeW.y.toFixed(3), hL.x.toFixed(3), hL.y.toFixed(3), hR.x.toFixed(3), hR.y.toFixed(3), d.toFixed(4)]);
    }
    requestAnimationFrame(render);
  }

  document.getElementById("stopBtn").onclick = () => {
    isRec = false;
    const csv = "\ufeff" + dataLog.map(e => e.join(",")).join("\n");
    const link = document.createElement("a");
    link.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
    link.download = `lego_trial_${document.getElementById("trialNum").value}.csv`;
    link.click();
    document.getElementById("trialNum").value = parseInt(document.getElementById("trialNum").value) + 1;
  };
  setup();
</script>
</body>
</html>
