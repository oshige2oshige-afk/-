<script type="module">
  import { FaceLandmarker, HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

  let faceLM, handLM;
  let isRec = false;
  let dataLog = [["Timestamp", "Gaze_Dir", "Gaze_X", "Gaze_Y", "R_Hand_X", "R_Hand_Y", "R_Hand_Z", "L_Hand_X", "L_Hand_Y", "L_Hand_Z", "Eye_Hand_Dist"]];
  
  let curIris = {x:0.5, y:0.5}, curR = {x:null, y:null, z:null}, curL = {x:null, y:null, z:null}, curGDir = "-";
  let distHist = new Array(50).fill(0);

  const v1 = document.getElementById("v1"), v2 = document.getElementById("v2");
  const ctx1 = document.getElementById("c1").getContext("2d");
  const ctx2 = document.getElementById("c2").getContext("2d");
  const gCtx = document.getElementById("hGraph").getContext("2d");

  async function setup() {
    try {
      const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
      faceLM = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task" },
        runningMode: "VIDEO", numFaces: 1
      });
      handLM = await HandLandmarker.createFromOptions(vision, {
        baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task" },
        runningMode: "VIDEO", numHands: 2
      });

      const vids = (await navigator.mediaDevices.enumerateDevices()).filter(d => d.kind === 'videoinput');
      const s1 = document.getElementById("sel1"), s2 = document.getElementById("sel2");
      vids.forEach((v, i) => { 
        const name = v.label || `Camera ${i+1}`;
        s1.add(new Option(name, v.deviceId)); 
        s2.add(new Option(name, v.deviceId)); 
      });
      if(vids.length > 1) s2.selectedIndex = 1;

      document.getElementById("startBtn").disabled = false;
      document.getElementById("msg").innerText = "システム準備完了";
    } catch (e) {
      document.getElementById("msg").innerText = "起動エラー: " + e.message;
    }
  }

  async function startCam(vEl, id) {
    if(vEl.srcObject) vEl.srcObject.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id ? {exact:id} : undefined, width: 320, height: 240 } });
    vEl.srcObject = stream;
    return new Promise((resolve) => {
      vEl.onloadedmetadata = () => {
        vEl.play();
        resolve();
      };
    });
  }

  document.getElementById("startBtn").onclick = async () => {
    try {
      document.getElementById("startBtn").disabled = true;
      document.getElementById("msg").innerText = "カメラ起動中...";
      await startCam(v1, document.getElementById("sel1").value);
      await startCam(v2, document.getElementById("sel2").value);
      isRec = true;
      document.getElementById("stopBtn").disabled = false;
      document.getElementById("msg").innerText = "分析中...";
      render();
    } catch (e) {
      alert("カメラの起動に失敗しました。");
      document.getElementById("startBtn").disabled = false;
    }
  };

  function render() {
    if(!isRec) return;
    const now = performance.now();

    // ① 視線解析
    if(v1.readyState >= 2 && v1.videoWidth > 0) {
      ctx1.drawImage(v1, 0, 0, 320, 240);
      const res = faceLM.detectForVideo(v1, now);
      if(res.faceLandmarks && res.faceLandmarks.length > 0) {
        curIris = res.faceLandmarks[0][468]; 
        curGDir = (curIris.y < 0.43) ? "Up" : (curIris.x < 0.48) ? "Right" : (curIris.x > 0.52) ? "Left" : "Center";
        document.getElementById("res1").innerText = curGDir;
      }
    }

    // ② 手元解析
    if(v2.readyState >= 2 && v2.videoWidth > 0) {
      ctx2.drawImage(v2, 0, 0, 320, 240);
      const res = handLM.detectForVideo(v2, now);
      curR = {x:null, y:null, z:null}; curL = {x:null, y:null, z:null};

      if(res.landmarks && res.landmarks.length > 0) {
        res.landmarks.forEach((landmarks, idx) => {
          // 安全なラベル取得（エラー回避）
          let label = "Unknown";
          if (res.handedness && res.handedness[idx] && res.handedness[idx][0]) {
            label = res.handedness[idx][0].categoryName;
          }

          const p = landmarks[9];
          // 右手として判定、または手が1つのみの場合は暫定的に右として扱う
          if(label === 'Right' || (res.landmarks.length === 1 && label !== 'Left')) {
             curR = {x:p.x, y:p.y, z:p.z};
             document.getElementById("rStatus").innerText = `X:${p.x.toFixed(2)} Y:${p.y.toFixed(2)}`;
          } else {
             curL = {x:p.x, y:p.y, z:p.z};
             document.getElementById("lStatus").innerText = `X:${p.x.toFixed(2)} Y:${p.y.toFixed(2)}`;
          }
          window.drawConnectors(ctx2, landmarks, HandLandmarker.HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
        });

        if(curR.x !== null) {
          const d = Math.sqrt(Math.pow(curIris.x - curR.x, 2) + Math.pow(curIris.y - curR.y, 2));
          document.getElementById("distStatus").innerText = d.toFixed(3);
          distHist.push(d); distHist.shift();
          drawGraph();
          dataLog.push([new Date().toISOString(), curGDir, curIris.x.toFixed(4), curIris.y.toFixed(4), curR.x.toFixed(4), curR.y.toFixed(4), curR.z.toFixed(4), curL.x||"", curL.y||"", curL.z||"", d.toFixed(4)]);
        }
      }
    }
    requestAnimationFrame(render);
  }

  function drawGraph() {
    gCtx.clearRect(0, 0, 320, 60);
    gCtx.strokeStyle = "#1a73e8";
    gCtx.lineWidth = 2;
    gCtx.beginPath();
    distHist.forEach((v, i) => {
      const x = (320 / 50) * i, y = 60 - (v * 100);
      if(i === 0) gCtx.moveTo(x, y); else gCtx.lineTo(x, y);
    });
    gCtx.stroke();
  }

  document.getElementById("stopBtn").onclick = () => {
    isRec = false;
    const csv = "\ufeff" + dataLog.map(e => e.join(",")).join("\n");
    const link = document.createElement("a");
    link.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
    link.download = `analysis_${Date.now()}.csv`;
    link.click();
    setTimeout(() => location.reload(), 500);
  };

  setup();
</script>
