<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>技能分析 - 物理枠同期システム</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js"></script>
  <style>
    body { font-family: sans-serif; background: #f0f2f5; text-align: center; margin: 0; padding-bottom: 150px; }
    .container { display: flex; justify-content: center; gap: 10px; padding: 10px; flex-wrap: wrap; }
    .box { background: white; padding: 15px; border-radius: 15px; width: 340px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .video-wrap { position: relative; width: 320px; height: 240px; background: #000; border-radius: 10px; overflow: hidden; }
    video { display: none; } 
    canvas { position: absolute; top: 0; left: 0; width: 320px; height: 240px; cursor: crosshair; }
    .status { background: #f1f3f4; padding: 10px; border-radius: 8px; font-size: 13px; margin-top: 10px; text-align: left; }
    .controls { background: white; padding: 20px; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #ddd; z-index: 1000; }
    .setting-panel { font-size: 12px; margin-bottom: 10px; color: #666; }
    button { padding: 10px 25px; font-size: 16px; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; }
    #startBtn { background: #1a73e8; color: white; }
    #stopBtn { background: #ea4335; color: white; margin-left: 10px; }
  </style>
</head>
<body>

<h2 style="margin-top:20px;">レゴ分析：物理枠(50cm) 同期計測システム</h2>

<div class="container">
  <div class="box">
    <h3 style="color:#1a73e8;">① 視線解析</h3>
    <select id="sel1" style="width:100%; margin-bottom:10px;"></select>
    <div class="video-wrap">
      <video id="v1" autoplay playsinline muted></video>
      <canvas id="c1" width="320" height="240"></canvas>
    </div>
  </div>

  <div class="box">
    <h3 style="color:#ea4335;">② 手元動作解析</h3>
    <select id="sel2" style="width:100%; margin-bottom:10px;"></select>
    <div class="video-wrap">
      <video id="v2" autoplay playsinline muted></video>
      <canvas id="c2" width="320" height="240"></canvas>
    </div>
    <div class="status">
      枠内座標 X: <span id="hX">-</span> Y: <span id="hY">-</span><br>
      手眼シンクロ距離: <span id="distStatus">-</span>
    </div>
  </div>
</div>

<div class="controls">
  <div class="setting-panel">
    【設定】赤枠をドラッグしてテープに合わせる / 試行：第 <input type="number" id="trialNum" value="1" style="width:40px;"> 回
  </div>
  <button id="startBtn" disabled>記録開始</button>
  <button id="stopBtn" disabled>保存して終了</button>
  <p id="msg" style="margin:5px 0 0 0; font-size:12px;">AI準備中...</p>
</div>

<script type="module">
  import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

  let faceLM, isRec = false;
  let dataLog = [];
  
  // 物理枠（テープ）に合わせるためのデジタル赤枠設定
  let roi = { x: 50, y: 40, w: 220, h: 160 }; 
  let isDragging = false;

  let gazeW = {x:0.5, y:0.5}, handW = {x:0.5, y:0.5};
  let curGDir = "-";

  const v1 = document.getElementById("v1"), v2 = document.getElementById("v2");
  const ctx1 = document.getElementById("c1").getContext("2d"), ctx2 = document.getElementById("c2").getContext("2d");

  // 赤枠調整用イベント
  document.getElementById("c2").onmousedown = (e) => { isDragging = true; };
  document.onmouseup = () => { isDragging = false; };
  document.getElementById("c2").onmousemove = (e) => {
    if(isDragging && !isRec) {
      roi.x = e.offsetX - roi.w/2;
      roi.y = e.offsetY - roi.h/2;
    }
  };

  async function setup() {
    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
    faceLM = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task" },
      runningMode: "VIDEO"
    });
    const vids = (await navigator.mediaDevices.enumerateDevices()).filter(d => d.kind === 'videoinput');
    vids.forEach((v, i) => { 
      document.getElementById("sel1").add(new Option(v.label || `Cam ${i+1}`, v.deviceId)); 
      document.getElementById("sel2").add(new Option(v.label || `Cam ${i+1}`, v.deviceId)); 
    });
    document.getElementById("startBtn").disabled = false;
    document.getElementById("msg").innerText = "【準備完了】赤枠をマウスでテープの枠に重ねてから開始してください";
  }

  async function startCam(vEl, id) {
    vEl.srcObject = await navigator.mediaDevices.getUserMedia({ video: { deviceId: {exact:id}, width: 320, height: 240 } });
  }

  document.getElementById("startBtn").onclick = async () => {
    await startCam(v1, document.getElementById("sel1").value);
    await startCam(v2, document.getElementById("sel2").value);
    isRec = true;
    dataLog = [["Trial","Time","Gaze_Dir","Gaze_X","Gaze_Y","Hand_X","Hand_Y","Dist"]];
    document.getElementById("stopBtn").disabled = false;
    render();
  };

  function render() {
    if(!isRec && !isDragging) {
        // プレビュー表示
        if(v2.readyState >= 2) {
            ctx2.drawImage(v2, 0, 0, 320, 240);
            ctx2.strokeStyle = "red"; ctx2.lineWidth = 2;
            ctx2.strokeRect(roi.x, roi.y, roi.w, roi.h);
        }
    }
    if(!isRec) { requestAnimationFrame(render); return; }

    const now = performance.now();

    // ① 視線解析
    if(v1.readyState >= 2) {
      ctx1.drawImage(v1, 0, 0, 320, 240);
      const res = faceLM.detectForVideo(v1, now);
      if(res.faceLandmarks && res.faceLandmarks.length > 0) {
        const iris = res.faceLandmarks[0][468];
        const relY = (iris.y - 0.45) * 100;
        curGDir = (relY < -10) ? "Up" : (relY > 10) ? "Down" : "Center";
        gazeW.x = Math.max(0, Math.min(1, 0.5 + (iris.x - 0.5) * 4));
        gazeW.y = Math.max(0, Math.min(1, 0.5 + (iris.y - 0.45) * 4));
      }
    }

    // ② 手元領域解析
    if(v2.readyState >= 2) {
      ctx2.drawImage(v2, 0, 0, 320, 240);
      ctx2.strokeStyle = "red"; ctx2.strokeRect(roi.x, roi.y, roi.w, roi.h);

      const imgData = ctx2.getImageData(roi.x, roi.y, roi.w, roi.h).data;
      let px=0, py=0, count=0;
      // 肌色抽出フィルタ
      for(let i=0; i<imgData.length; i+=16) {
        const r = imgData[i], g = imgData[i+1], b = imgData[i+2];
        if(r > 100 && r > g && r > b && g > 40) {
          px += (i/4)%roi.w; py += Math.floor((i/4)/roi.w); count++;
        }
      }
      
      if(count > 10) {
        handW.x = px/count/roi.w; handW.y = py/count/roi.h;
        const dist = Math.sqrt(Math.pow(gazeW.x - handW.x, 2) + Math.pow(gazeW.y - handW.y, 2));

        document.getElementById("hX").innerText = handW.x.toFixed(2);
        document.getElementById("hY").innerText = handW.y.toFixed(2);
        document.getElementById("distStatus").innerText = dist.toFixed(3);

        ctx2.fillStyle = "blue"; ctx2.beginPath(); ctx2.arc(roi.x + handW.x*roi.w, roi.y + handW.y*roi.h, 10, 0, 7); ctx2.fill();
        ctx2.fillStyle = "lime"; ctx2.beginPath(); ctx2.arc(roi.x + gazeW.x*roi.w, roi.y + gazeW.y*roi.h, 6, 0, 7); ctx2.fill();

        dataLog.push([document.getElementById("trialNum").value, (now/1000).toFixed(2), curGDir, gazeW.x.toFixed(3), gazeW.y.toFixed(3), handW.x.toFixed(3), handW.y.toFixed(3), dist.toFixed(4)]);
      }
    }
    requestAnimationFrame(render);
  }

  document.getElementById("stopBtn").onclick = () => {
    isRec = false;
    const csv = "\ufeff" + dataLog.map(e => e.join(",")).join("\n");
    const link = document.createElement("a");
    link.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
    link.download = `lego_roi_trial_${document.getElementById("trialNum").value}.csv`;
    link.click();
    document.getElementById("trialNum").value = parseInt(document.getElementById("trialNum").value) + 1;
  };

  setup();
</script>
</body>
</html>
