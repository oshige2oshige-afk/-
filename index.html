<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDS-DMA Web: 技能分析システム（安定版）</title>
    <link rel="icon" href="data:,">
    
    <!-- Mediapipe Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --main-red: #e74c3c; --bg-dark: #121212; --card-bg: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; padding-bottom: 150px; }
        header { background: #000; padding: 20px; text-align: center; border-bottom: 3px solid var(--main-red); }
        .main-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .cam-box { background: var(--card-bg); border: 2px solid #333; border-radius: 12px; padding: 15px; width: 420px; text-align: center; position: relative; }
        .video-wrapper { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 8px; overflow: hidden; margin-top: 10px; }
        video, canvas { position: absolute; width: 100%; height: 100%; top: 0; left: 0; object-fit: contain; }
        .controls { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 20px; display: flex; justify-content: center; align-items: center; gap: 20px; border-top: 1px solid #444; z-index: 1000; }
        button { padding: 12px 35px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; border-radius: 50px; transition: 0.3s; }
        #record-btn { background: var(--main-red); color: white; }
        #record-btn:disabled { background: #555; cursor: wait; }
        #dl-btn { background: #2ecc71; color: white; display: none; }
        .dashboard { width: 95%; max-width: 1000px; margin: 30px auto; background: var(--card-bg); padding: 25px; border-radius: 15px; display: none; }
        .chart-container { background: white; padding: 15px; border-radius: 10px; height: 300px; position: relative; }
        select { background: #333; color: white; padding: 8px; width: 100%; border-radius: 5px; margin-bottom: 5px; }
        .loading-overlay { position: absolute; top: 55px; left: 15px; width: calc(100% - 30px); height: calc(100% - 70px); background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; border-radius: 8px; font-size: 14px; color: #fff; }
    </style>
</head>
<body>

<header>
    <h1>TDS-DMA Web Analysis</h1>
    <div id="ai-status">AIシステム初期化中...</div>
</header>

<div class="main-container">
    <div class="cam-box">
        <div id="loader-f" class="loading-overlay">正面AI準備中...</div>
        <select id="sel-f"></select>
        <div class="video-wrapper"><video id="v-face" autoplay playsinline muted></video><canvas id="c-face"></canvas></div>
    </div>
    <div class="cam-box">
        <div id="loader-h" class="loading-overlay">手元AI準備中...</div>
        <select id="sel-h"></select>
        <div class="video-wrapper"><video id="v-hand" autoplay playsinline muted></video><canvas id="c-hand"></canvas></div>
    </div>
</div>

<div class="controls">
    試行: <input type="number" id="trial" value="1" style="width:60px; padding:10px; text-align:center; border-radius:5px;">
    <button id="record-btn" disabled>AIロード中...</button>
    <button id="dl-btn">CSV保存</button>
</div>

<div class="dashboard" id="dash">
    <div class="grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
        <div class="chart-container"><canvas id="gazeChart"></canvas></div>
        <div class="chart-container"><canvas id="pathChart"></canvas></div>
    </div>
</div>

<script>
let faceMesh, hands;
let faceReady = false, handsReady = false;
let log = [];
let state = { gaze: "Center", rx: null, ry: null };
let charts = {};
let timer;

async function initAI() {
    // ライブラリがロードされるまで待機
    if (!window.FaceMesh || !window.Hands) {
        setTimeout(initAI, 500);
        return;
    }

    try {
        // Face Mesh初期化
        faceMesh = new window.FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });
        faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5, modelComplexity: 1 });

        // Hands初期化
        hands = new window.Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5 });

        // コールバック設定
        faceMesh.onResults(onFaceResults);
        hands.onResults(onHandResults);

        await initCameras();
    } catch (e) {
        console.error("AI Init Error:", e);
        document.getElementById('ai-status').innerText = "AI起動エラー";
    }
}

function onFaceResults(res) {
    faceReady = true;
    document.getElementById('loader-f').style.display = 'none';
    const canvas = document.getElementById('c-face');
    const ctx = canvas.getContext('2d');
    
    // キャンバスサイズをビデオに合わせる
    if (canvas.width !== 640) { canvas.width = 640; canvas.height = 480; }
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (res.multiFaceLandmarks && res.multiFaceLandmarks.length > 0) {
        const n = res.multiFaceLandmarks[0][1]; // 鼻の頭
        state.gaze = (n.x < 0.45 || n.x > 0.55) ? "Off-Center" : "Center";
        
        if (window.drawConnectors) {
            window.drawConnectors(ctx, res.multiFaceLandmarks[0], window.FACEMESH_TESSELATION, {color: '#C0C0C050', lineWidth: 1});
        }
    }
    checkAllReady();
}

function onHandResults(res) {
    handsReady = true;
    document.getElementById('loader-h').style.display = 'none';
    const canvas = document.getElementById('c-hand');
    const ctx = canvas.getContext('2d');
    
    if (canvas.width !== 640) { canvas.width = 640; canvas.height = 480; }
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    state.rx = state.ry = null;
    
    if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
        const lms = res.multiHandLandmarks[0];
        state.rx = (lms[9].x * 100).toFixed(1); // 中指付け根
        state.ry = ((1 - lms[9].y) * 100).toFixed(1);
        
        if (window.drawConnectors) {
            window.drawConnectors(ctx, lms, window.HAND_CONNECTIONS, {color: '#FF0000', lineWidth: 3});
        }
    }
    checkAllReady();
}

function checkAllReady() {
    const btn = document.getElementById('record-btn');
    if(faceReady && handsReady && btn.disabled) {
        btn.disabled = false;
        btn.innerText = "計測開始";
        document.getElementById('ai-status').innerText = "AIシステム稼働中";
    }
}

async function initCameras() {
    const devs = await navigator.mediaDevices.enumerateDevices();
    const vds = devs.filter(d => d.kind === 'videoinput');
    const selF = document.getElementById('sel-f');
    const selH = document.getElementById('sel-h');

    vds.forEach((d, i) => {
        selF.add(new Option(d.label || `Camera ${i}`, d.deviceId));
        selH.add(new Option(d.label || `Camera ${i}`, d.deviceId));
    });

    if (vds.length > 1) selH.selectedIndex = 1;

    const vf = document.getElementById('v-face');
    const vh = document.getElementById('v-hand');

    async function startStream(video, deviceId) {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { deviceId: deviceId ? { exact: deviceId } : undefined, width: 640, height: 480 }
        });
        video.srcObject = stream;
    }

    await startStream(vf, selF.value);
    await startStream(vh, selH.value);

    selF.onchange = () => startStream(vf, selF.value);
    selH.onchange = () => startStream(vh, selH.value);

    // メインループ
    async function predict() {
        if (vf.readyState >= 2) await faceMesh.send({image: vf});
        if (vh.readyState >= 2) await hands.send({image: vh});
        requestAnimationFrame(predict);
    }
    predict();
}

const recordBtn = document.getElementById('record-btn');
let isRecording = false;

recordBtn.onclick = () => {
    isRecording = !isRecording;
    if (isRecording) {
        log = [];
        recordBtn.innerText = "計測停止";
        recordBtn.style.background = "#555";
        document.getElementById('dash').style.display = "none";
        document.getElementById('dl-btn').style.display = "none";
        timer = setInterval(() => {
            log.push({ ...state, ts: log.length });
        }, 500); // 0.5秒刻み
    } else {
        clearInterval(timer);
        recordBtn.innerText = "計測開始";
        recordBtn.style.background = "var(--main-red)";
        document.getElementById('dl-btn').style.display = "inline-block";
        runAnalysis();
    }
};

function runAnalysis() {
    document.getElementById('dash').style.display = "block";
    const centers = log.filter(d => d.gaze === "Center").length;
    const rData = log.filter(d => d.rx !== null).map(d => ({x: parseFloat(d.rx), y: parseFloat(d.ry)}));

    if(charts.g) charts.g.destroy();
    charts.g = new Chart(document.getElementById('gazeChart'), {
        type: 'pie',
        data: {
            labels: ['正面視', '視線逸脱'],
            datasets: [{ data: [centers, log.length - centers], backgroundColor: ['#2ecc71', '#e74c3c'] }]
        },
        options: { plugins: { title: { display: true, text: '視線集中度' } } }
    });

    if(charts.p) charts.p.destroy();
    charts.p = new Chart(document.getElementById('pathChart'), {
        type: 'scatter',
        data: {
            datasets: [{ label: '手の動き', data: rData, backgroundColor: 'rgba(231, 76, 60, 0.6)' }]
        },
        options: {
            scales: { x: { min: 0, max: 100 }, y: { min: 0, max: 100 } },
            plugins: { title: { display: true, text: '手元作業エリア' } }
        }
    });
}

document.getElementById('dl-btn').onclick = () => {
    let csv = "Time(s),Gaze,X,Y\n";
    log.forEach(d => csv += `${d.ts * 0.5},${d.gaze},${d.rx || ''},${d.ry || ''}\n`);
    const blob = new Blob([csv], {type: 'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `SkillData_Trial${document.getElementById('trial').value}.csv`;
    a.click();
};

window.onload = initAI;
</script>
</body>
</html>
