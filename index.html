<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDS-DMA Web: 技能伝承・動作解析システム</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --main-red: #e74c3c; --dark-bg: #1e1e1e; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--dark-bg); color: white; margin: 0; overflow-x: hidden; }
        header { background: #000; padding: 20px; border-bottom: 3px solid var(--main-red); text-align: center; }
        .setup-guide { background: #333; padding: 10px; font-size: 0.9em; color: #f1c40f; text-align: center; }
        
        .main-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .cam-box { position: relative; width: 45%; min-width: 320px; aspect-ratio: 4/3; background: #000; border: 2px solid #444; border-radius: 10px; }
        video, canvas { position: absolute; width: 100%; height: 100%; top: 0; left: 0; border-radius: 8px; }
        
        .controls { text-align: center; margin: 30px 0; }
        button { padding: 15px 40px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; border-radius: 50px; transition: 0.3s; }
        #record-btn { background: var(--main-red); color: white; box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4); }
        #record-btn.active { background: #7f8c8d; transform: scale(0.95); }
        #dl-btn { background: #2ecc71; color: white; margin-left: 10px; display: none; }

        .dashboard { width: 90%; max-width: 1100px; margin: 0 auto 50px auto; background: #2c3e50; padding: 30px; border-radius: 15px; display: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .chart-container { background: white; padding: 15px; border-radius: 10px; height: 350px; }
        .stat-card { background: #34495e; padding: 20px; border-radius: 10px; margin-top: 20px; border-left: 5px solid var(--main-red); }
        
        select { background: #444; color: white; padding: 5px; border: 1px solid #666; margin-bottom: 5px; width: 100%; border-radius: 5px; }
    </style>
</head>
<body>

<header>
    <h1>TAKUMI Development System (TDS-DMA Web)</h1>
    <div>技能伝承システム：動作および視線活動分析</div>
</header>

<div class="setup-guide">
    ⚠️ 重要設定：カメラとの距離を <strong>65cm</strong> に固定し、正面（視線）と真上（手元）に配置してください。
</div>

<div class="main-container">
    <div>
        <select id="cam-select-f"></select>
        <div class="cam-box">
            <video id="v-face" autoplay playsinline></video>
            <canvas id="c-face"></canvas>
            <div style="position:absolute; bottom:10px; left:10px; background:rgba(0,0,0,0.5); padding:2px 10px;">CAM 1: 正面/視線</div>
        </div>
    </div>
    <div>
        <select id="cam-select-h"></select>
        <div class="cam-box">
            <video id="v-hand" autoplay playsinline></video>
            <canvas id="c-hand"></canvas>
            <div style="position:absolute; bottom:10px; left:10px; background:rgba(0,0,0,0.5); padding:2px 10px;">CAM 2: 真上/手元</div>
        </div>
    </div>
</div>

<div class="controls">
    <button id="record-btn">計測開始 (Start Analysis)</button>
    <button id="dl-btn">CSVダウンロード</button>
</div>

<div class="dashboard" id="dash">
    <h2 style="border-bottom: 2px solid var(--main-red); padding-bottom: 10px;">技能解析レポート (Skill Analysis Report)</h2>
    <div class="grid">
        <div class="chart-container">
            <canvas id="gazeChart"></canvas>
        </div>
        <div class="chart-container">
            <canvas id="pathChart"></canvas>
        </div>
    </div>
    <div class="stat-card" id="summary"></div>
</div>

<script>
const vFace = document.getElementById('v-face');
const vHand = document.getElementById('v-hand');
const recordBtn = document.getElementById('record-btn');
const dlBtn = document.getElementById('dl-btn');
const dash = document.getElementById('dash');

let isRecording = false;
let log = [];
let startTime;
let charts = {};

// MediaPipe Setup
const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});

faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5 });
hands.setOptions({ maxNumHands: 2, minDetectionConfidence: 0.8 });

let state = { gaze: "Center", rx:null, ry:null, lx:null, ly:null };

faceMesh.onResults(res => {
    if (res.multiFaceLandmarks?.length > 0) {
        const n = res.multiFaceLandmarks[0][1];
        state.gaze = (n.x < 0.47 || n.x > 0.53) ? "Off-Center" : "Center";
    }
});

hands.onResults(res => {
    state.rx = state.ry = state.lx = state.ly = null;
    if (res.multiHandLandmarks) {
        res.multiHandLandmarks.forEach((lms, i) => {
            const side = res.multiHandedness[i].label;
            const p = lms[9]; // 中指付け根
            if(side === 'Right') { state.rx = (p.x*100).toFixed(1); state.ry = ((1-p.y)*100).toFixed(1); }
            else { state.lx = (p.x*100).toFixed(1); state.ly = ((1-p.y)*100).toFixed(1); }
        });
    }
});

// Recording Logic
recordBtn.onclick = () => {
    isRecording = !isRecording;
    if (isRecording) {
        log = []; startTime = Date.now();
        recordBtn.innerText = "計測中... 停止して分析";
        recordBtn.classList.add('active');
        dash.style.display = "none";
        dlBtn.style.display = "none";
        
        timer = setInterval(() => {
            log.push({ ...state, ts: ((Date.now()-startTime)/1000).toFixed(1) });
        }, 1000); // 1秒サンプリング
    } else {
        clearInterval(timer);
        recordBtn.innerText = "計測開始 (Start Analysis)";
        recordBtn.classList.remove('active');
        dlBtn.style.display = "inline-block";
        runAnalysis();
    }
};

function runAnalysis() {
    dash.style.display = "block";
    const centers = log.filter(d => d.gaze === "Center").length;
    const total = log.length;
    
    // Gaze Pie Chart
    if(charts.g) charts.g.destroy();
    charts.g = new Chart(document.getElementById('gazeChart'), {
        type: 'doughnut',
        data: {
            labels: ['センター注視', '視線逸脱'],
            datasets: [{ data: [centers, total-centers], backgroundColor: ['#2ecc71', '#e74c3c'] }]
        },
        options: { plugins: { title: { display: true, text: '視線集中度分析 (%)' } } }
    });

    // Hand Path Chart
    const rData = log.filter(d => d.rx !== null).map(d => ({x: d.rx, y: d.ry}));
    const lData = log.filter(d => d.lx !== null).map(d => ({x: d.lx, y: d.ly}));
    if(charts.p) charts.p.destroy();
    charts.p = new Chart(document.getElementById('pathChart'), {
        type: 'scatter',
        data: {
            datasets: [
                { label: '右手(Right)', data: rData, backgroundColor: 'red' },
                { label: '左手(Left)', data: lData, backgroundColor: 'blue' }
            ]
        },
        options: {
            scales: { x: {min:0, max:100}, y: {min:0, max:100} },
            plugins: { title: { display: true, text: '手の軌跡範囲 (1sサンプリング)' } }
        }
    });

    document.getElementById('summary').innerHTML = `
        <h3>【解析統計結果】</h3>
        ・合計計測時間: ${total} 秒<br>
        ・視線集中率: ${Math.round((centers/total)*100)} %<br>
        ・手の有効サンプリング数: 右手 ${rData.length}回 / 左手 ${lData.length}回<br><br>
        <small>論文「金型仕上げ技能における匠の動作分析」に基づき、動作の安定性と注視点を評価しました。</small>
    `;
}

dlBtn.onclick = () => {
    let csv = "Time,Gaze,Right_X,Right_Y,Left_X,Left_Y\n";
    log.forEach(d => csv += `${d.ts},${d.gaze},${d.rx},${d.ry},${d.lx},${d.ly}\n`);
    const b = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = `TDS_DMA_Data_${new Date().getTime()}.csv`;
    a.click();
};

async function init() {
    const devs = await navigator.mediaDevices.enumerateDevices();
    const vds = devs.filter(d => d.kind === 'videoinput');
    const selF = document.getElementById('cam-select-f');
    const selH = document.getElementById('cam-select-h');
    
    vds.forEach((d, i) => {
        selF.add(new Option(d.label || `CAM ${i}`, d.deviceId));
        selH.add(new Option(d.label || `CAM ${i}`, d.deviceId));
    });

    const start = async (s, v) => {
        v.srcObject = await navigator.mediaDevices.getUserMedia({video: {deviceId: s.value, width: 640, height: 480}});
    };

    selF.onchange = () => start(selF, vFace);
    selH.onchange = () => start(selH, vHand);
    start(selF, vFace);
    if(vds.length > 1) { selH.selectedIndex = 1; start(selH, vHand); } else { start(selH, vHand); }

    function run() {
        faceMesh.send({image: vFace});
        hands.send({image: vHand});
        requestAnimationFrame(run);
    }
    run();
}
init();
</script>
</body>
</html>
